function showToast(m,t){t=t||'success';var c=document.getElementById('toastContainer'),e=document.createElement('div');e.className='toast toast-'+t;e.innerHTML='<i class="fas fa-'+(t==='success'?'check-circle':t==='warning'?'exclamation-triangle':'times-circle')+' flex-shrink-0 mt-0.5"></i><span>'+m+'</span>';c.appendChild(e);setTimeout(function(){if(e.parentNode)e.remove();},5000);}

function fetchSoal(mapel,kelas){var db=getDB(activeClass);if(!db)return Promise.resolve([]);var q=db.collection('questions');if(mapel)q=q.where('mapel','==',mapel);if(kelas)q=q.where('kelas','==',kelas);return q.get().then(function(s){var d=[];s.forEach(function(doc){d.push(doc.data());});return sByT(d,false);}).catch(function(){return[];});}

/* ===== KELOLA TP ===== */
function rTP(c){var h='<div class="fade-in card"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-light">Kelola TP &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3><button onclick="openAddTP()" class="btn-primary text-sm"><i class="fas fa-plus mr-1"></i>Tambah</button></div>'+filterBar('tp')+'<div id="tpC" class="max-h-[65vh] overflow-y-auto pr-1"></div></div>';c.innerHTML=h;reloadtp();}
function reloadtp(){var f=getFilter('tp');var db=getDB(activeClass);var ct=document.getElementById('tpC');if(!db){ct.innerHTML='<p class="text-danger">DB error</p>';return;}ct.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i></p>';var q=db.collection('tps');if(f.mapel)q=q.where('mapel','==',f.mapel);else if(f.kelas)q=q.where('kelas','==',f.kelas);q.get().then(function(s){var docs=[];s.forEach(function(d){docs.push({id:d.id,data:d.data()});});docs=sByT(docs,true);if(f.mapel&&f.kelas)docs=docs.filter(function(d){return d.data.kelas===f.kelas;});if(!docs.length){ct.innerHTML='<p class="text-muted text-center py-8">Kosong.</p>';return;}var h='';docs.forEach(function(d){var t=d.data;var mn=(MAPEL_LIST.find(function(m){return m.id===t.mapel;})||{}).nama||t.mapel;h+='<div class="p-3 bg-dark/40 rounded border-l-4 border-kopAccent mb-2"><div class="flex justify-between mb-1"><span class="text-xs font-bold text-kopAccent">'+mn+'</span><span class="text-xs text-muted">'+t.kelas+'</span></div><p class="text-sm text-light">'+t.text+'</p><button onclick="delTP(\''+d.id+'\')" class="text-danger hover:text-white text-xs mt-2"><i class="fas fa-trash mr-1"></i>Hapus</button></div>';});ct.innerHTML=h;}).catch(function(e){ct.innerHTML='<p class="text-danger p-4">'+e.message+'</p>';});}
function openAddTP(){var h='<h3 class="font-bold text-light mb-4">Tambah TP</h3><div class="space-y-4"><div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-muted block mb-1">Mapel</label><select id="iMTP" class="input-field">';MAPEL_LIST.forEach(function(m){h+='<option value="'+m.id+'">'+m.nama+'</option>';});h+='</select></div><div><label class="text-xs text-muted block mb-1">Kelas</label><select id="iKTP" class="input-field">';KELAS_LIST.forEach(function(k){h+='<option value="'+k+'"'+(k===activeClass?' selected':'')+'>'+k+'</option>';});h+='</select></div></div><div><label class="text-xs text-muted block mb-1">Isi TP</label><textarea id="iTTP" class="input-field" rows="3"></textarea></div></div><div class="mt-6 flex justify-end gap-3"><button onclick="closeModal()" class="btn-secondary">Batal</button><button onclick="saveTP()" class="btn-primary">Simpan</button></div>';openModal(h);}
function saveTP(){var db=getDB(activeClass);if(!db){showToast('DB error','error');return;}var t=document.getElementById('iTTP').value.trim();if(!t){showToast('Kosong','error');return;}db.collection('tps').add({kecamatanId:'ADMIN_GLOBAL',mapel:document.getElementById('iMTP').value,kelas:document.getElementById('iKTP').value,text:t,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){showToast('TP tersimpan');closeModal();reloadtp();}).catch(function(e){showToast('Gagal: '+e.message,'error');});}
function delTP(id){if(!confirm('Hapus?'))return;getDB(activeClass).collection('tps').doc(id).delete().then(function(){showToast('Dihapus');reloadtp();}).catch(function(){showToast('Gagal','error');});}

/* ===== BUAT SOAL ===== */
function rSoal(c){_qImg='';_oImgs={A:'',B:'',C:'',D:'',E:''};var opts=getOpts(activeClass);
  var h='<div class="fade-in space-y-4">';

  /* Indikator + Pie Chart */
  h+='<div class="card"><div class="flex justify-between items-center mb-4"><h4 class="font-bold text-light text-sm"><i class="fas fa-chart-pie mr-2 text-kopAccent"></i>Indikator & Komposisi Level</h4><button onclick="hitungIndikator()" class="btn-secondary text-xs"><i class="fas fa-sync mr-1"></i>Refresh</button></div>';
  h+='<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4"><div class="stat-box"><div class="stat-num text-kopAccent" id="indTotal">-</div><div class="text-xs text-muted">Total Soal</div></div><div class="stat-box"><div class="stat-num text-success" id="indMudah">-</div><div class="text-xs text-muted">Mudah</div></div><div class="stat-box"><div class="stat-num text-warning" id="indSedang">-</div><div class="text-xs text-muted">Sedang</div></div><div class="stat-box"><div class="stat-num text-danger" id="indSulit">-</div><div class="text-xs text-muted">Sulit</div></div></div>';
  h+='<div class="flex flex-col md:flex-row items-center gap-6"><div class="pie-chart" id="pieChart" style="background:conic-gradient(#22c55e 0% 33%,#f59e0b 33% 66%,#ef4444 66% 100%)"><div class="pie-center"><span class="text-2xl font-black text-light" id="pieTotal">0</span><span class="text-xs text-muted">soal</span></div></div><div class="space-y-3 flex-1"><div class="flex items-center gap-3"><span class="w-4 h-4 rounded bg-success flex-shrink-0"></span><span class="text-sm text-light flex-1">Mudah</span><span class="text-sm font-bold text-success" id="pieMudah">0%</span></div><div class="flex items-center gap-3"><span class="w-4 h-4 rounded bg-warning flex-shrink-0"></span><span class="text-sm text-light flex-1">Sedang</span><span class="text-sm font-bold text-warning" id="pieSedang">0%</span></div><div class="flex items-center gap-3"><span class="w-4 h-4 rounded bg-danger flex-shrink-0"></span><span class="text-sm text-light flex-1">Sulit</span><span class="text-sm font-bold text-danger" id="pieSulit">0%</span></div></div></div></div>';

  /* Form */
  h+='<div class="card"><h3 class="font-bold text-light mb-1">Buat Soal &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3>';
  h+='<p class="text-xs text-info mb-4"><i class="fas fa-info-circle mr-1"></i>'+activeClass+' menggunakan opsi '+opts.join(', ')+'</p>';

  h+='<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4"><div><label class="text-xs text-muted block mb-1">Tipe Soal</label><select id="cQType" class="input-field" onchange="togOpts()"><option value="pg">Pilihan Ganda</option><option value="uraian">Uraian</option></select></div>';
  h+='<div><label class="text-xs text-muted block mb-1">Kelas</label><select id="cKelas" class="input-field" onchange="onKC()">';KELAS_LIST.forEach(function(k){h+='<option value="'+k+'"'+(k===activeClass?' selected':'')+'>'+k+' ('+getOpts(k).join('-')+')</option>';});h+='</select></div>';
  h+='<div><label class="text-xs text-muted block mb-1">Level Kesulitan</label><select id="cLevel" class="input-field"><option value="mudah">Mudah</option><option value="sedang">Sedang</option><option value="sulit">Sulit</option></select></div></div>';

  h+='<div class="grid md:grid-cols-2 gap-4 mb-4"><div><label class="text-xs text-muted block mb-1">Mapel</label><select id="cMapel" class="input-field" onchange="loadTPSoal()">';MAPEL_LIST.forEach(function(m){h+='<option value="'+m.id+'">'+m.nama+'</option>';});h+='</select></div>';
  h+='<div><label class="text-xs text-muted block mb-1">TP</label><select id="cTP" class="input-field"><option value="">-- Pilih TP --</option></select></div></div>';

  h+='<div class="mb-4"><label class="text-xs text-muted block mb-1">Gambar Soal (opsional)</label><div class="flex gap-3"><div class="upload-zone flex-1 py-3" id="qIZ" onclick="document.getElementById(\'qIF\').click()"><input type="file" id="qIF" accept="image/*" class="hidden" onchange="hQI(this)"><div id="qIP"><i class="fas fa-cloud-upload-alt text-xl text-muted"></i><p class="text-xs text-muted mt-1">Upload</p></div></div><div class="flex-1"><input type="text" id="cIUrl" class="input-field text-xs" placeholder="Atau URL gambar" oninput="_qImg=this.value;pQIU(this.value)"><div id="qUP"></div></div></div></div>';
  h+='<div class="mb-4"><label class="text-xs text-muted block mb-1">Teks Pertanyaan</label><textarea id="cText" class="input-field" rows="3"></textarea></div>';

  h+='<div id="optsA" class="mb-4 space-y-3">';
  opts.forEach(function(l){h+='<div class="bg-dark/30 rounded-lg p-3 border border-border"><div class="flex gap-2 mb-2"><span class="w-8 text-center font-bold text-kopAccent text-sm">'+l+'</span><input type="text" id="cO'+l+'" class="input-field text-sm"></div><div class="flex gap-2"><div class="upload-zone flex-shrink-0 py-2 px-3" id="oIZ'+l+'" onclick="document.getElementById(\'oIF'+l+'\').click()"><input type="file" id="oIF'+l+'" accept="image/*" class="hidden" onchange="hOI(this,\''+l+'\')"><div id="oIP'+l+'" class="text-xs text-muted whitespace-nowrap"><i class="fas fa-image mr-1"></i>Gambar</div></div><input type="text" id="cOI'+l+'" class="input-field text-xs" placeholder="URL gambar" oninput="_oImgs[\''+l+'\']=this.value"></div></div>';});h+='</div>';

  h+='<div class="mb-4"><label class="text-xs text-muted block mb-1">Kunci Jawaban</label><input type="text" id="cAns" class="input-field" placeholder="'+opts.join(' / ')+'"></div>';
  h+='<button onclick="saveSoal()" class="btn-primary w-full"><i class="fas fa-save mr-2"></i>Simpan ke '+activeClass+'</button></div></div>';c.innerHTML=h;
  loadTPSoal();hitungIndikator();
}
function onKC(){var k=document.getElementById('cKelas').value;if(k!==activeClass){activeClass=k;document.getElementById('dbSel').value=k;}rSoal(document.getElementById('pageContent'));}
function togOpts(){document.getElementById('optsA').style.display=document.getElementById('cQType').value==='pg'?'block':'none';}
function loadTPSoal(){var db=getDB(activeClass);var sel=document.getElementById('cTP');sel.innerHTML='<option value="">-- Pilih TP --</option>';if(!db)return;var mapel=document.getElementById('cMapel').value;var kelas=document.getElementById('cKelas').value;var q=db.collection('tps');if(mapel)q=q.where('mapel','==',mapel);else if(kelas)q=q.where('kelas','==',kelas);q.get().then(function(s){s.forEach(function(d){var t=d.data();if(mapel&&kelas&&t.kelas!==kelas)return;sel.innerHTML+='<option value="'+d.id+'">'+t.text.substring(0,60)+'</option>';});}).catch(function(){});}

function hitungIndikator(){
  var db=getDB(activeClass);if(!db){['indTotal','indMudah','indSedang','indSulit'].forEach(function(id){document.getElementById(id).textContent='-';});return;}
  var kelas=document.getElementById('cKelas').value;
  db.collection('questions').where('kelas','==',kelas).get().then(function(s){
    var total=0,m=0,sd=0,sl=0;s.forEach(function(d){var q=d.data();total++;if(q.level==='mudah')m++;else if(q.level==='sedang')sd++;else if(q.level==='sulit')sl++;});
    document.getElementById('indTotal').textContent=total;
    document.getElementById('indMudah').textContent=m;
    document.getElementById('indSedang').textContent=sd;
    document.getElementById('indSulit').textContent=sl;
    /* Pie chart */
    var pM=total?Math.round(m/total*100):33;var pSd=total?Math.round(sd/total*100):33;var pSl=100-pM-pSd;if(pSl<0)pSl=0;
    document.getElementById('pieChart').style.background='conic-gradient(#22c55e 0% '+pM+'%,#f59e0b '+pM+'% '+(pM+pSd)+'%,#ef4444 '+(pM+pSd)+'% 100%)';
    document.getElementById('pieTotal').textContent=total;
    document.getElementById('pieMudah').textContent=pM+'%';
    document.getElementById('pieSedang').textContent=pSd+'%';
    document.getElementById('pieSulit').textContent=pSl+'%';
  }).catch(function(){['indTotal','indMudah','indSedang','indSulit'].forEach(function(id){document.getElementById(id).textContent='-';});});
}

function hQI(inp){if(!inp.files||!inp.files[0])return;var f=inp.files[0];var rd=new FileReader();rd.onload=function(e){document.getElementById('qIZ').classList.add('has-img');document.getElementById('qIP').innerHTML='<img src="'+e.target.result+'" class="img-prev mx-auto"><p class="text-xs text-success mt-1">'+f.name+'</p>';};rd.readAsDataURL(f);showToast('Uploading...','warning');upImg(activeClass,f).then(function(u){_qImg=u;showToast('Gambar OK');}).catch(function(){showToast('Upload gagal','error');});}
function pQIU(u){var el=document.getElementById('qUP');_qImg=u.trim();if(u.trim())el.innerHTML='<img src="'+u+'" class="img-prev mx-auto" onerror="this.style.display=\'none\'">';else el.innerHTML='';}
function hOI(inp,l){if(!inp.files||!inp.files[0])return;var f=inp.files[0];var rd=new FileReader();rd.onload=function(e){document.getElementById('oIZ'+l).classList.add('has-img');document.getElementById('oIP'+l).innerHTML='<img src="'+e.target.result+'" style="max-height:30px;border-radius:4px" class="inline mr-1">';};rd.readAsDataURL(f);upImg(activeClass,f).then(function(u){_oImgs[l]=u;}).catch(function(){});}

function saveSoal(){var db=getDB(activeClass);if(!db){showToast('DB error','error');return;}var txt=document.getElementById('cText').value.trim();if(!txt&&!_qImg){showToast('Isi pertanyaan atau gambar','error');return;}
  var opts=getOpts(activeClass);
  var data={kecamatanId:'ADMIN_GLOBAL',kelas:document.getElementById('cKelas').value,mapel:document.getElementById('cMapel').value,tpId:document.getElementById('cTP').value||'',level:document.getElementById('cLevel').value,type:document.getElementById('cQType').value,text:txt,imageUrl:_qImg||'',answer:document.getElementById('cAns').value.trim(),options:[],optionImages:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(data.type==='pg'){opts.forEach(function(l){var v=document.getElementById('cO'+l).value.trim();var img=document.getElementById('cOI'+l).value.trim()||_oImgs[l]||'';if(v||img){data.options.push(v);data.optionImages.push(img);}});}
  db.collection('questions').add(data).then(function(){showToast('Soal tersimpan ('+data.level.toUpperCase()+')');_qImg='';_oImgs={A:'',B:'',C:'',D:'',E:''};document.getElementById('cText').value='';document.getElementById('cAns').value='';document.getElementById('cIUrl').value='';document.getElementById('qUP').innerHTML='';document.getElementById('qIP').innerHTML='<i class="fas fa-cloud-upload-alt text-xl text-muted"></i><p class="text-xs text-muted mt-1">Upload</p>';document.getElementById('qIZ').classList.remove('has-img');opts.forEach(function(l){document.getElementById('cO'+l).value='';document.getElementById('cOI'+l).value='';document.getElementById('oIP'+l).innerHTML='<i class="fas fa-image mr-1"></i>Gambar';document.getElementById('oIZ'+l).classList.remove('has-img');});hitungIndikator();}).catch(function(e){showToast('GAGAL: '+e.message,'error');});}

/* ===== BANK SOAL ===== */
function rBank(c){var h='<div class="fade-in card"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-light">Bank Soal &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3><button onclick="reloadbank()" class="btn-secondary text-xs"><i class="fas fa-sync mr-1"></i>Refresh</button></div>'+filterBar('bank')+'<div id="bankC" class="max-h-[65vh] overflow-y-auto pr-1"></div></div>';c.innerHTML=h;reloadbank();}
function reloadbank(){var f=getFilter('bank');var db=getDB(activeClass);var ct=document.getElementById('bankC');if(!db){ct.innerHTML='<p class="text-danger">DB error</p>';return;}ct.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i></p>';var q=db.collection('questions');if(f.mapel)q=q.where('mapel','==',f.mapel);else if(f.kelas)q=q.where('kelas','==',f.kelas);q.get().then(function(s){var docs=[];s.forEach(function(d){docs.push(d.data());});docs=sByT(docs,true);if(f.mapel&&f.kelas)docs=docs.filter(function(d){return d.kelas===f.kelas;});if(!docs.length){ct.innerHTML='<p class="text-muted text-center py-8">Kosong.</p>';return;}var h='<p class="text-xs text-muted mb-3">'+docs.length+' soal</p>';docs.forEach(function(q){var lv=LEVEL_COLORS[q.level]||LEVEL_COLORS.mudah;var b=q.type==='pg'?'bg-kopAccent/20 text-kopAccent':'bg-info/20 text-info';h+='<div class="p-3 bg-dark/40 rounded border-l-4 '+lv.border+' mb-2"><div class="flex justify-between items-center mb-1"><div class="flex gap-2"><span class="text-xs px-2 py-0.5 rounded '+b+' font-bold">'+q.type+'</span><span class="text-xs px-2 py-0.5 rounded '+lv.bg+' '+lv.text+' font-bold">'+lv.label+'</span></div><span class="text-xs text-muted">'+q.mapel+' &middot; '+q.kelas+'</span></div>';if(q.imageUrl)h+='<img src="'+q.imageUrl+'" class="img-prev mb-2" onerror="this.style.display=\'none\'">';h+='<p class="text-sm text-light">'+q.text+'</p>';if(q.type==='pg'&&q.options){h+='<div class="mt-2 space-y-1">';q.options.forEach(function(o,i){var img=(q.optionImages&&q.optionImages[i])?' <img src="'+q.optionImages[i]+'" style="max-height:30px;vertical-align:middle;margin-left:4px;border-radius:4px" onerror="this.style.display=\'none\'">':'';h+='<div class="text-xs text-muted"><span class="font-bold text-kopAccent mr-1">'+String.fromCharCode(65+i)+'.</span>'+o+img+'</div>';});h+='</div>';}if(q.answer)h+='<div class="text-xs text-kopAccent mt-1 font-bold">Kunci: '+q.answer+'</div></div>';});ct.innerHTML=h;}).catch(function(e){ct.innerHTML='<p class="text-danger p-4">'+e.message+'</p>';});}

/* ===== CETAK SOAL ===== */
function rPrintSoal(c){var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Cetak Soal &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3>'+filterBar('prso')+'<button onclick="doPrintSoal()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak / PDF</button></div><div id="prsoP" class="print-preview-wrap"><div class="print-preview-sheet text-center p-10 text-gray-400">Pilih filter</div></div></div>';c.innerHTML=h;}
function reloadprso(){var f=getFilter('prso');if(!f.mapel){document.getElementById('prsoP').innerHTML='<div class="print-preview-sheet text-center p-10 text-gray-400">Pilih Mapel</div>';return;}fetchSoal(f.mapel,f.kelas).then(function(docs){var byLevel={mudah:[],sedang:[],sulit:[]};docs.forEach(function(q){if(f.kelas&&q.kelas!==f.kelas)return;var lv=q.level||'mudah';if(!byLevel[lv])byLevel[lv]=[];byLevel[lv].push(q);});var mn=(MAPEL_LIST.find(function(m){return m.id===f.mapel;})||{}).nama||f.mapel;var hh='<div class="print-preview-sheet"><div class="kop"><h1>Pemerintah Kabupaten Majalengka</h1><h1>Dinas Pendidikan</h1><h2>SAT GENERATOR</h2></div><div style="text-align:center;margin-bottom:20px"><h3 style="font-size:14pt;font-weight:bold;text-decoration:underline;text-transform:uppercase">Sumatif Akhir Tahun (SAT)</h3><p>'+mn+' &mdash; '+(f.kelas||'Semua Kelas')+'</p></div>';var nomor=1;['mudah','sedang','sulit'].forEach(function(lv){var items=byLevel[lv]||[];if(!items.length)return;var pg=[],ur=[];items.forEach(function(q){if(q.type==='pg')pg.push(q);else ur.push(q);});hh+='<div style="font-weight:bold;margin-bottom:10px;border-bottom:2px solid #000;padding-bottom:5px;text-transform:uppercase">'+lv+' (Level '+lv+')</div>';if(pg.length){hh+='<div style="font-weight:bold;margin-bottom:8px">Pilihan Ganda</div>';pg.forEach(function(q){hh+='<div class="soal-item"><div class="soal-num">'+nomor+'.</div>';if(q.imageUrl)hh+='<img src="'+q.imageUrl+'" class="soal-img" onerror="this.style.display=\'none\'">';hh+='<div class="soal-text">'+(q.text||'')+'</div><div class="opsi-w">';(q.options||[]).forEach(function(o,oi){var img=(q.optionImages&&q.optionImages[oi])?' <img src="'+q.optionImages[oi]+'" class="opsi-img" onerror="this.style.display=\'none\'">':'';hh+='<div class="opsi-r"><span class="opsi-l">'+String.fromCharCode(65+oi)+'.</span> '+o+img+'</div>';});hh+='</div></div>';nomor++;});}if(ur.length){hh+='<div style="font-weight:bold;margin-bottom:8px;margin-top:12px">Uraian</div>';ur.forEach(function(q){hh+='<div class="soal-item"><div class="soal-num">'+nomor+'.</div>';if(q.imageUrl)hh+='<img src="'+q.imageUrl+'" class="soal-img" onerror="this.style.display=\'none\'">';hh+='<div class="soal-text">'+(q.text||'')+'</div><div class="answer-lines"></div></div>';nomor++;});}});hh+='</div>';document.getElementById('prsoP').innerHTML=hh;});}
function doPrintSoal(){var s=document.querySelector('#prsoP .print-preview-sheet');if(!s){showToast('Tidak ada preview','error');return;}printFrame(s.innerHTML);}

/* ===== CETAK KISI-KISI ===== */
function rKisi(c){var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Cetak Kisi-Kisi &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3>'+filterBar('kisi')+'<button onclick="doPrintKisi()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak / PDF</button></div><div id="kisiP" class="print-preview-wrap"><div class="print-preview-sheet text-center p-10 text-gray-400">Pilih filter</div></div></div>';c.innerHTML=h;}
function reloadkisi(){var f=getFilter('kisi');if(!f.mapel){document.getElementById('kisiP').innerHTML='<div class="print-preview-sheet text-center p-10 text-gray-400">Pilih Mapel</div>';return;}fetchSoal(f.mapel,f.kelas).then(function(docs){var mn=(MAPEL_LIST.find(function(m){return m.id===f.mapel;})||{}).nama||f.mapel;var hh='<div class="print-preview-sheet"><div class="kop"><h1>Pemerintah Kabupaten Majalengka</h1><h1>Dinas Pendidikan</h1><h2>KISI-KISI SOAL</h2></div><div style="text-align:center;margin-bottom:16px"><h3 style="font-size:14pt;font-weight:bold;text-decoration:underline;text-transform:uppercase">Sumatif Akhir Tahun (SAT)</h3><p>'+mn+' &mdash; '+(f.kelas||'Semua Kelas')+'</p></div>';hh+='<table><thead><tr><th style="width:5%">No</th><th style="width:12%">Level</th><th style="width:13%">Tipe</th><th style="width:40%">Indikator Soal</th><th style="width:10%">No. Soal</th><th style="width:20%">Kunci</th></tr></thead><tbody>';docs.forEach(function(q,i){if(f.kelas&&q.kelas!==f.kelas)return;var lv=(q.level||'mudah').toUpperCase();hh+='<tr><td style="text-align:center">'+(i+1)+'</td><td style="text-align:center;font-weight:bold">'+lv+'</td><td style="text-align:center">'+(q.type==='pg'?'PG':'Uraian')+'</td><td>'+(q.text||'').substring(0,120)+'...</td><td style="text-align:center">'+(i+1)+'</td><td style="text-align:center;font-weight:bold">'+(q.answer||'-')+'</td></tr>';});hh+='</tbody></table></div>';document.getElementById('kisiP').innerHTML=hh;});}
function doPrintKisi(){var s=document.querySelector('#kisiP .print-preview-sheet');if(!s){showToast('Tidak ada preview','error');return;}printFrame(s.innerHTML);}

/* ===== CETAK KUNCI JAWABAN ===== */
function rKunci(c){var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Cetak Kunci Jawaban &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3>'+filterBar('knc')+'<button onclick="doPrintKunci()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak / PDF</button></div><div id="kncP" class="print-preview-wrap"><div class="print-preview-sheet text-center p-10 text-gray-400">Pilih filter</div></div></div>';c.innerHTML=h;}
function reloadknc(){var f=getFilter('knc');if(!f.mapel){document.getElementById('kncP').innerHTML='<div class="print-preview-sheet text-center p-10 text-gray-400">Pilih Mapel</div>';return;}fetchSoal(f.mapel,f.kelas).then(function(docs){var mn=(MAPEL_LIST.find(function(m){return m.id===f.mapel;})||{}).nama||f.mapel;var pg=[],ur=[];docs.forEach(function(q){if(f.kelas&&q.kelas!==f.kelas)return;if(q.type==='pg')pg.push(q);else ur.push(q);});var hh='<div class="print-preview-sheet"><div class="kop"><h1>Pemerintah Kabupaten Majalengka</h1><h1>Dinas Pendidikan</h1><h2>KUNCI JAWABAN</h2></div><div style="text-align:center;margin-bottom:16px"><h3 style="font-size:14pt;font-weight:bold;text-decoration:underline;text-transform:uppercase">Sumatif Akhir Tahun (SAT)</h3><p>'+mn+' &mdash; '+(f.kelas||'Semua Kelas')+'</p></div>';if(pg.length){hh+='<table style="width:70%;margin:0 auto 20px"><thead><tr><th>No</th><th>Level</th><th>Kunci</th></tr></thead><tbody>';pg.forEach(function(q,i){hh+='<tr><td style="text-align:center">'+(i+1)+'</td><td style="text-align:center">'+(q.level||'mudah')+'</td><td style="text-align:center;font-weight:bold;font-size:14pt">'+(q.answer||'-')+'</td></tr>';});hh+='</tbody></table>';}if(ur.length){hh+='<div style="margin-top:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:5px;margin-bottom:10px">Jawaban Uraian</div>';ur.forEach(function(q,i){hh+='<div style="margin-bottom:6px"><strong>'+(pg.length+i+1)+'.</strong> <span style="font-size:10pt;color:#666">('+((q.level||'mudah').toUpperCase())+')</span> '+(q.answer||'(lihat pedoman)')+'</div>';});}hh+='</div>';document.getElementById('kncP').innerHTML=hh;});}
function doPrintKunci(){var s=document.querySelector('#kncP .print-preview-sheet');if(!s){showToast('Tidak ada preview','error');return;}printFrame(s.innerHTML);}

/* ===== PENSEKORAN ===== */
function rSkor(c){var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Pensekoran &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3>'+filterBar('skr')+'<button onclick="loadSkor()" class="btn-primary text-sm"><i class="fas fa-calculator mr-2"></i>Muat Data Soal</button></div><div id="skorBox"></div></div>';c.innerHTML=h;}
function reloadskr(){document.getElementById('skorBox').innerHTML='';}
var pg_kunci=[];
function loadSkor(){pg_kunci=[];var f=getFilter('skr');if(!f.mapel){showToast('Pilih Mapel','warning');return;}var box=document.getElementById('skorBox');box.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i></p>';fetchSoal(f.mapel,f.kelas).then(function(docs){var pg=[],ur=[];docs.forEach(function(q){if(f.kelas&&q.kelas!==f.kelas)return;if(q.type==='pg'){pg.push(q);pg_kunci.push(q.answer||'');}else ur.push(q);});if(!pg.length&&!ur.length){box.innerHTML='<p class="text-muted text-center py-8">Kosong.</p>';return;}var mn=(MAPEL_LIST.find(function(m){return m.id===f.mapel;})||{}).nama||f.mapel;var bobotPG=pg.length?Math.round(100/pg.length):0;var bobotUr=ur.length?Math.round(100/ur.length):0;var h='<div class="card"><div class="flex justify-between items-center mb-4"><h4 class="font-bold text-light">'+mn+' &mdash; '+(f.kelas||'Semua')+'</h4><div class="text-xs"><span class="text-info mr-3">PG: '+bobotPG+' poin</span><span class="text-warning">Uraian: '+bobotUr+' poin</span></div></div>';if(pg.length){h+='<div class="mb-6"><h5 class="font-bold text-info text-sm mb-3">I. Pilihan Ganda ('+bobotPG+' poin/soal)</h5><div class="bg-dark/40 rounded-lg overflow-hidden"><table class="w-full text-sm"><thead><tr class="bg-dark/60"><th class="p-2 text-left w-8">No</th><th class="p-2 text-left w-16">Level</th><th class="p-2 text-left w-12">Kunci</th><th class="p-2 text-left">Jawaban</th><th class="p-2 text-center w-14">Skor</th></tr></thead><tbody>';pg.forEach(function(q,i){var lv=q.level||'mudah';var lc=LEVEL_COLORS[lv]||LEVEL_COLORS.mudah;var opts=getOpts(q.kelas||activeClass);h+='<tr class="border-t border-border"><td class="p-2 font-bold">'+(i+1)+'</td><td class="p-2"><span class="text-xs px-1 py-0.5 rounded '+lc.bg+' '+lc.text+' font-bold">'+lc.label+'</span></td><td class="p-2 font-bold text-kopAccent">'+(q.answer||'-')+'</td><td class="p-2"><select id="jawabPG'+i+'" class="input-field text-xs py-1" onchange="hitungSkorPG('+i+','+bobotPG+')"><option value="">--</option>';opts.forEach(function(l){h+='<option value="'+l+'">'+l+'</option>';});h+='</select></td><td class="p-2 text-center"><span id="skorPG'+i+'" class="font-bold text-muted">0</span></td></tr>';});h+='</tbody></table></div><div class="flex justify-between items-center mt-2 p-3 bg-info/10 rounded-lg border border-info/30"><span class="text-sm font-bold text-info">Total PG</span><span id="totalPG" class="font-bold text-info text-lg">0</span></div></div>';}if(ur.length){h+='<div class="mb-6"><h5 class="font-bold text-warning text-sm mb-3">II. Uraian (Maks '+bobotUr+' poin/soal)</h5><div class="bg-dark/40 rounded-lg overflow-hidden"><table class="w-full text-sm"><thead><tr class="bg-dark/60"><th class="p-2 text-left w-8">No</th><th class="p-2 text-left w-16">Level</th><th class="p-2 text-left">Soal</th><th class="p-2 text-center w-20">Skor</th></tr></thead><tbody>';ur.forEach(function(q,i){var lv=q.level||'mudah';var lc=LEVEL_COLORS[lv]||LEVEL_COLORS.mudah;h+='<tr class="border-t border-border"><td class="p-2 font-bold">'+(pg.length+i+1)+'</td><td class="p-2"><span class="text-xs px-1 py-0.5 rounded '+lc.bg+' '+lc.text+' font-bold">'+lc.label+'</span></td><td class="p-2 text-xs text-muted">'+(q.text||'').substring(0,80)+'...</td><td class="p-2 text-center"><input type="number" id="skorUr'+i+'" class="score-input" min="0" max="'+bobotUr+'" value="0" onchange="hitungSkorUr('+i+','+bobotUr+')"></td></tr>';});h+='</tbody></table></div><div class="flex justify-between items-center mt-2 p-3 bg-warning/10 rounded-lg border border-warning/30"><span class="text-sm font-bold text-warning">Total Uraian</span><span id="totalUr" class="font-bold text-warning text-lg">0</span></div></div>';}h+='<div class="p-4 bg-kopAccent/10 rounded-lg border-2 border-kopAccent/40 text-center"><div class="text-xs text-muted mb-1">TOTAL NILAI AKHIR</div><div id="totalAkhir" class="text-4xl font-black text-kopAccent">0</div></div><div class="text-center mt-4"><button onclick="resetSkor()" class="btn-secondary text-sm"><i class="fas fa-redo mr-1"></i>Reset</button></div></div>';box.innerHTML=h;}).catch(function(){box.innerHTML='<p class="text-danger p-4">Gagal.</p>';});}
function hitungSkorPG(i,bobot){var jawab=document.getElementById('jawabPG'+i).value;var skor=(jawab===pg_kunci[i])?bobot:0;document.getElementById('skorPG'+i).textContent=skor;document.getElementById('skorPG'+i).className='font-bold '+(skor>0?'text-success':'text-muted');updateTotalPG();}
function updateTotalPG(){var total=0;for(var i=0;i<50;i++){var el=document.getElementById('skorPG'+i);if(el)total+=parseInt(el.textContent)||0;}var tEl=document.getElementById('totalPG');if(tEl)tEl.textContent=total;updateAkhir();}
function hitungSkorUr(i,bobot){var v=parseInt(document.getElementById('skorUr'+i).value)||0;if(v>bobot)v=bobot;if(v<0)v=0;document.getElementById('skorUr'+i).value=v;var total=0;for(var j=0;j<50;j++){var el=document.getElementById('skorUr'+j);if(el)total+=parseInt(el.value)||0;}var tEl=document.getElementById('totalUr');if(tEl)tEl.textContent=total;updateAkhir();}
function updateAkhir(){var pg=0,ur=0;var pEl=document.getElementById('totalPG');var uEl=document.getElementById('totalUr');if(pEl)pg=parseInt(pEl.textContent)||0;if(uEl)ur=parseInt(uEl.textContent)||0;var t=pg+ur;if(t>100)t=100;var aEl=document.getElementById('totalAkhir');if(aEl)aEl.textContent=t;}
function resetSkor(){for(var i=0;i<50;i++){var el=document.getElementById('jawabPG'+i);if(el)el.value='';var sEl=document.getElementById('skorPG'+i);if(sEl){sEl.textContent='0';sEl.className='font-bold text-muted';}var uEl=document.getElementById('skorUr'+i);if(uEl)uEl.value='0';}var tEl=document.getElementById('totalUr');if(tEl)tEl.textContent='0';updateTotalPG();updateAkhir();showToast('Skor direset');}

/* ===== MONITOR DB ===== */
function rMon(c){var h='<div class="fade-in space-y-6"><div class="card"><h3 class="font-bold text-light mb-4"><i class="fas fa-project-diagram mr-2 text-kopAccent"></i>Status Database</h3><div class="space-y-3">';KELAS_LIST.forEach(function(k){var cfg=FIREBASE_CONFIGS[k];var a=k===activeClass;h+='<div class="flex items-center justify-between p-3 rounded-lg border '+(a?'border-kopAccent bg-kopAccent/5':'border-border bg-dark/30')+'"><div class="flex items-center gap-3">'+(a?'<span class="pulse-dot bg-success"></span>':'<span class="w-2 h-2 rounded-full bg-muted inline-block"></span>')+'<div><span class="text-sm font-bold '+(a?'text-kopAccent':'text-light')+'">'+k+'</span><p class="text-xs text-muted font-mono">'+cfg.projectId+'</p></div></div><div class="flex gap-2"><a href="https://console.firebase.google.com/project/'+cfg.projectId+'/firestore/databases" target="_blank" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-database mr-1"></i>Firestore</a><a href="https://console.firebase.google.com/project/'+cfg.projectId+'/storage" target="_blank" class="btn-secondary text-xs py-1 px-2"><i class="fas fa-hdd mr-1"></i>Storage</a></div></div>';});h+='</div></div>';h+='<div class="card"><h3 class="font-bold text-light mb-4"><i class="fas fa-chart-bar mr-2 text-info"></i>Statistik</h3><button onclick="hitungMonStats()" id="btnMS" class="btn-primary text-sm mb-4"><i class="fas fa-calculator mr-2"></i>Hitung</button><div id="monBox"></div></div>';h+='<div class="card border-warning/50"><h3 class="font-bold text-warning mb-3 text-sm"><i class="fas fa-code mr-2"></i>Panduan Rules</h3><pre class="bg-black/60 p-4 rounded-lg text-xs font-mono text-success overflow-x-auto border border-border">rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if true;\n    }\n  }\n}</pre></div></div>';c.innerHTML=h;}
function hitungMonStats(){var btn=document.getElementById('btnMS');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>...';Promise.all(KELAS_LIST.map(function(k){var db=getDB(k);if(!db)return Promise.resolve({kelas:k,t:0,q:0,err:true});return Promise.all([db.collection('tps').get(),db.collection('questions').get()]).then(function(s){return{kelas:k,t:s[0].size,q:s[1].size,err:false};}).catch(function(){return{kelas:k,t:0,q:0,err:true};});})).then(function(stats){var h='<div class="grid grid-cols-3 gap-3 mb-4">';var tt=0,tq=0;stats.forEach(function(s){tt+=s.t;tq+=s.q;});h+='<div class="stat-box"><div class="stat-num text-kopAccent">'+stats.length+'</div><div class="text-xs text-muted">Database</div></div><div class="stat-box"><div class="stat-num text-info">'+tt+'</div><div class="text-xs text-muted">Total TP</div></div><div class="stat-box"><div class="stat-num text-success">'+tq+'</div><div class="text-xs text-muted">Total Soal</div></div></div>';stats.forEach(function(s){var a=s.kelas===activeClass;h+='<div class="p-3 rounded-lg border '+(a?'border-kopAccent bg-kopAccent/5':'border-border bg-dark/30')+' mb-2 flex justify-between items-center"><div><span class="font-bold text-sm '+(a?'text-kopAccent':'text-light')+'">'+s.kelas+'</span>'+(s.err?' <span class="text-xs text-danger"><i class="fas fa-exclamation-triangle"></i></span>':'')+'</div><div class="flex gap-4 text-xs"><span class="text-info">'+s.t+' TP</span><span class="text-success">'+s.q+' Soal</span></div></div>';});document.getElementById('monBox').innerHTML=h;btn.disabled=false;btn.innerHTML='<i class="fas fa-calculator mr-2"></i>Hitung Ulang';});}

function printFrame(content){var f=document.createElement('iframe');f.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(f);var d=f.contentDocument||f.contentWindow.document;d.open();d.write('<!DOCTYPE html><html><head><title>Cetak</title><style>@page{size:A4 portrait;margin:1.5cm 2cm 2cm}body{margin:0;padding:0;font-family:"Times New Roman",serif;font-size:12pt;line-height:1.4;color:#000;-webkit-print-color-adjust:exact}.kop{text-align:center;padding-bottom:10px;margin-bottom:20px;border-bottom:3px double #000}.kop h1{font-size:13pt;font-weight:bold;text-transform:uppercase;margin:0}.kop h2{font-size:16pt;font-weight:bold;text-transform:uppercase;margin:0}table{width:100%;border-collapse:collapse;margin:10px 0}th,td{border:1px solid #000;padding:6px 8pt;font-size:11pt;text-align:left;vertical-align:top}th{background:#f0f0f0;font-weight:bold;text-align:center}.soal-item{margin-bottom:18px;page-break-inside:avoid;overflow:hidden}.soal-num{float:left;font-weight:bold;width:30px}.soal-text{display:block;margin-left:35px;font-size:12pt}.opsi-w{margin-top:6px;margin-left:35px}.opsi-r{display:block;margin-bottom:3pt;font-size:12pt}.opsi-l{font-weight:bold}.soal-img{max-width:65%;max-height:160px;margin:6px 0 6px 35px;display:block}.opsi-img{max-width:45%;max-height:70px;vertical-align:middle;margin-left:4px}.answer-lines{margin-top:6px;margin-left:35px;border:1px dashed #bbb;height:70px;background:#fafafa}</style></head><body>'+content+'</body></html>');d.close();setTimeout(function(){f.contentWindow.focus();f.contentWindow.print();setTimeout(function(){try{document.body.removeChild(f)}catch(e){}},3000);},600);}
</script>
</body>
